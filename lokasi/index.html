<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Lokasi Anda — Asisten Asa</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#1a3e20',
                        'background-light': '#f6f7f6',
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        @keyframes ping {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .location-ping {
            animation: ping 1.5s ease-out infinite;
        }
    </style>
</head>

<body class="bg-background-light font-sans antialiased">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="flex items-center bg-white px-4 py-4 border-b border-primary/10">
            <a href="/"
                class="text-primary flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1 class="text-slate-900 text-lg font-bold ml-2">Lokasi Anda</h1>
        </header>

        <!-- Content -->
        <main class="flex-1 flex flex-col items-center justify-center px-6 text-center gap-8">
            <!-- Animated location pin -->
            <div class="relative flex items-center justify-center size-28">
                <div class="absolute size-12 rounded-full bg-primary/20 location-ping"></div>
                <div class="size-16 rounded-full bg-primary/10 flex items-center justify-center z-10">
                    <span class="material-symbols-outlined text-primary text-4xl"
                        style="font-variation-settings: 'FILL' 1">near_me</span>
                </div>
            </div>

            <div>
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Lokasi Anda</h2>
                <p class="text-slate-500 text-sm leading-relaxed max-w-xs">
                    Bagikan lokasi Anda secara real-time kepada orang yang dipercaya atau temukan rute yang dapat
                    diakses.
                </p>
            </div>

            <div class="bg-primary/5 border border-primary/20 rounded-2xl px-6 py-4 w-full max-w-xs">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary">construction</span>
                    <p class="text-sm text-slate-600 text-left">Fitur ini sedang dalam pengembangan. Segera hadir!</p>
                </div>
            </div>

            <a href="/"
                class="w-full max-w-xs py-4 rounded-2xl bg-primary text-white font-bold text-center hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20">
                Kembali ke Beranda
            </a>
        </main>
    </div>
    <script src="../voice-navigation-feature.js"></script>
</body>

</html>
