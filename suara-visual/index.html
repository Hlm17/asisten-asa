<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Suara ke Visual/Getaran — Asisten Asa</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#1a3e20',
                        'brand-orange': '#f97316',
                        'background-light': '#f6f7f6',
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }

            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .pulse-ring {
            animation: pulse-ring 1.8s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
    </style>
</head>

<body class="bg-background-light font-sans antialiased">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="flex items-center bg-white px-4 py-4 border-b border-brand-orange/10">
            <a href="/"
                class="text-brand-orange flex size-10 items-center justify-center rounded-full hover:bg-brand-orange/10 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1 class="text-slate-900 text-lg font-bold ml-2">Suara ke Visual/Getaran</h1>
        </header>

        <!-- Content -->
        <main class="flex-1 flex flex-col items-center justify-center px-6 text-center gap-8">
            <!-- Animated icon -->
            <div class="relative flex items-center justify-center">
                <div class="absolute size-24 rounded-full bg-brand-orange/20 pulse-ring"></div>
                <div class="size-24 rounded-full bg-brand-orange/10 flex items-center justify-center z-10">
                    <span class="material-symbols-outlined text-brand-orange text-5xl"
                        style="font-variation-settings: 'FILL' 1">vibration</span>
                </div>
            </div>

            <div>
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Suara ke Visual/Getaran</h2>
                <p class="text-slate-500 text-sm leading-relaxed max-w-xs">
                    Fitur ini akan mengkonversi suara sekitar menjadi sinyal visual dan getaran agar lebih mudah
                    dirasakan.
                </p>
            </div>

            <div class="bg-brand-orange/5 border border-brand-orange/20 rounded-2xl px-6 py-4 w-full max-w-xs">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-brand-orange">construction</span>
                    <p class="text-sm text-slate-600 text-left">Fitur ini sedang dalam pengembangan. Segera hadir!</p>
                </div>
            </div>

            <a href="/"
                class="w-full max-w-xs py-4 rounded-2xl bg-brand-orange text-white font-bold text-center hover:bg-orange-600 transition-colors shadow-lg shadow-brand-orange/20">
                Kembali ke Beranda
            </a>
        </main>
    </div>
    <script src="../voice-navigation-feature.js"></script>
</body>

</html>
